version: "3.9"

services:

  api:
    build: .
    container_name: rag-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      - ollama

  ui:
    image: python:3.10
    container_name: rag-ui
    working_dir: /app
    volumes:
      - ./ui:/app
    ports:
      - "8501:8501"
    command: >
      bash -c "pip install streamlit requests &&
               streamlit run app.py --server.port 8501 --server.address 0.0.0.0"
    depends_on:
      - api

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

volumes:
  ollama:
